<!DOCTYPE html>
<html>
<head>
  <title>Visa News</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    .card { background:#fff; padding:15px; margin-bottom:10px; border-radius:6px; }
  </style>
</head>
<body>

<h2>Visa & Immigration News</h2>
<div id="news">Loading...</div>

<script>
async function fetchNews() {
  const container = document.getElementById("news");

  try {
    const res = await fetch("http://localhost/whatsapp-api/backend/api/news.php");
    const data = await res.json();

    console.log("Frontend Data:", data);

    container.innerHTML = "";

    if (!data.articles || data.articles.length === 0) {
      container.innerHTML = "No news found";
      return;
    }

    const keywords = ["visa", "immigration", "passport", "schengen", "travel"];

    const filtered = data.articles.filter(article => {
      const text = (article.title + " " + (article.description || "")).toLowerCase();
      return keywords.some(k => text.includes(k));
    });

    if (filtered.length === 0) {
      container.innerHTML = "No visa-related news found";
      return;
    }

    filtered.forEach(article => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${article.title}</h3>
        <p>${article.description || ""}</p>
        <a href="${article.url}" target="_blank">Read more</a>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "Error loading news";
  }
}

fetchNews();
</script>

</body>
</html>
